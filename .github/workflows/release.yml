name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS .app
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller pymupdf customtkinter pillow requests anthropic pydantic python-docx docxtpl pdfplumber docx2pdf google-auth google-auth-httplib2 google-api-python-client gspread pandas openpyxl

      - name: Write mailshot config
        env:
          BH_CLIENT_ID:     ${{ secrets.BH_CLIENT_ID }}
          BH_CLIENT_SECRET: ${{ secrets.BH_CLIENT_SECRET }}
          BH_USERNAME:      ${{ secrets.BH_USERNAME }}
          BH_PASSWORD:      ${{ secrets.BH_PASSWORD }}
          BH_DC:            ${{ secrets.BH_DC }}
          BH_REDIRECT_URI:  ${{ secrets.BH_REDIRECT_URI }}
          BH_REFRESH_TOKEN: ${{ secrets.BH_REFRESH_TOKEN }}
          BH_REST_URL:      ${{ secrets.BH_REST_URL }}
          INSTANTLY_KEY:    ${{ secrets.INSTANTLY_API_KEY }}
        run: |
          mkdir -p mailshot_helper
          python3 - <<'PYEOF'
          import json, os
          cfg = {
            "bullhorn_client_id":     os.environ["BH_CLIENT_ID"],
            "bullhorn_client_secret": os.environ["BH_CLIENT_SECRET"],
            "bullhorn_username":      os.environ["BH_USERNAME"],
            "bullhorn_password":      os.environ["BH_PASSWORD"],
            "bullhorn_redirect_uri":  os.environ.get("BH_REDIRECT_URI","https://welcome.bullhornstaffing.com"),
            "dc":                     os.environ.get("BH_DC","emea"),
            "refresh_token":          os.environ.get("BH_REFRESH_TOKEN",""),
            "rest_url":               os.environ.get("BH_REST_URL",""),
            "instantly_api_key":      os.environ.get("INSTANTLY_KEY",""),
          }
          with open("mailshot_helper/config.json","w") as f: json.dump(cfg,f,indent=2)
          PYEOF

      - name: Write CV config
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEETS_ID:  ${{ secrets.GOOGLE_SHEETS_ID }}
          TURSO_URL:         ${{ secrets.TURSO_URL }}
          TURSO_AUTH_TOKEN:  ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json, os
          cfg = {
            "turso": {"url": os.environ.get("TURSO_URL",""), "auth_token": os.environ.get("TURSO_AUTH_TOKEN","")},
            "formatting": {"margin_top_cm":4.4,"margin_bottom_cm":2.4,"margin_left_cm":1.27,"margin_right_cm":1.27,"font_family":"Roboto","template":"Cornerstone.docx","name_size_pt":20,"heading_size_pt":12,"body_size_pt":10,"accent_color":"#2a2a2a","photo_enabled":False,"photo_width_mm":35,"logo_path":"","logo_width_mm":40},
            "anthropic_api_key": os.environ["ANTHROPIC_API_KEY"],
            "google_sheets": {"credentials_path":"service-account-key.json","spreadsheet_id":os.environ["GOOGLE_SHEETS_ID"]}
          }
          with open("cv_config.json","w") as f: json.dump(cfg,f,indent=2)
          PYEOF

      - name: Write service account key
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: echo "$SERVICE_ACCOUNT_JSON" > cv_parse_format/service-account-key.json

      - name: Build .icns icon
        run: |
          python3 - <<'PYEOF'
          from PIL import Image
          import os, subprocess
          img = Image.open("logo.png").convert("RGBA")
          iconset = "logo.iconset"
          os.makedirs(iconset, exist_ok=True)
          for s in [16,32,64,128,256,512]:
              img.resize((s,s),   Image.LANCZOS).save(f"{iconset}/icon_{s}x{s}.png")
              img.resize((s*2,s*2), Image.LANCZOS).save(f"{iconset}/icon_{s}x{s}@2x.png")
          subprocess.run(["iconutil","-c","icns",iconset,"-o","logo.icns"], check=True)
          import shutil; shutil.rmtree(iconset)
          print("logo.icns ready")
          PYEOF

      - name: Write VERSION from tag
        run: echo "${GITHUB_REF#refs/tags/v}" > VERSION

      - name: Copy tool modules to root for PyInstaller
        run: |
          cp cv_parse_format/cv_parse_format_tool.py .
          cp cv_parse_format/google_sheets_store.py .
          cp cv_parse_format/google_drive_store.py .
          cp cv_parse_format/turso_store.py .
          cp cv_parse_format/turso_cache.py .
          cp cv_parse_format/postgres_store.py .
          cp import_contact/contact_tool.py .
          cp mailshot_helper/mailshot_helper_tool.py .

      - name: PyInstaller build
        run: |
          pyinstaller \
            --noconfirm --windowed --name "CPS Tools" \
            --icon "logo.icns" \
            --add-data "logo.png:." \
            --add-data "cv_parse_format/templates:cv_parse_format/templates" \
            --add-data "cv_parse_format/design:cv_parse_format/design" \
            --add-data "cv_parse_format/fonts:cv_parse_format/fonts" \
            --add-data "mailshot_helper/config.json:mailshot_helper" \
            --add-data "cv_config.json:." \
            --add-data "cv_parse_format/service-account-key.json:cv_parse_format" \
            --add-data "contact_tool.py:." \
            --hidden-import cv_parse_format_tool \
            --hidden-import mailshot_helper_tool \
            --hidden-import google_sheets_store \
            --hidden-import google_drive_store \
            --hidden-import turso_store \
            --hidden-import turso_cache \
            --hidden-import lookup_store \
            --hidden-import postgres_store \
            --hidden-import updater \
            --add-data "VERSION:." \
            --hidden-import customtkinter --hidden-import anthropic --hidden-import pydantic \
            --hidden-import docx --hidden-import docxtpl --hidden-import pdfplumber \
            --hidden-import docx2pdf --hidden-import PIL --hidden-import fitz \
            --hidden-import requests --hidden-import google.oauth2.service_account \
            --hidden-import google.auth.transport.requests --hidden-import googleapiclient.discovery \
            --hidden-import gspread --hidden-import pandas --hidden-import openpyxl \
            --hidden-import pdfminer --hidden-import pdfminer.high_level \
            --hidden-import pdfminer.layout --hidden-import pdfminer.pdfpage \
            --hidden-import jinja2 \
            CornerstoneTools.py

      - name: Ad-hoc sign and remove quarantine
        run: |
          codesign --force --deep --sign - "dist/CPS Tools.app" || true
          xattr -cr "dist/CPS Tools.app" || true

      - name: Zip .app
        run: cd dist && zip -r --symlinks "../CPS-Tools-macOS.zip" "CPS Tools.app"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: CPS-Tools-macOS.zip

  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pymupdf customtkinter pillow requests anthropic pydantic python-docx docxtpl pdfplumber docx2pdf google-auth google-auth-httplib2 google-api-python-client gspread pandas openpyxl

      - name: Write mailshot config
        env:
          BH_CLIENT_ID:     ${{ secrets.BH_CLIENT_ID }}
          BH_CLIENT_SECRET: ${{ secrets.BH_CLIENT_SECRET }}
          BH_USERNAME:      ${{ secrets.BH_USERNAME }}
          BH_PASSWORD:      ${{ secrets.BH_PASSWORD }}
          BH_DC:            ${{ secrets.BH_DC }}
          BH_REDIRECT_URI:  ${{ secrets.BH_REDIRECT_URI }}
          BH_REFRESH_TOKEN: ${{ secrets.BH_REFRESH_TOKEN }}
          BH_REST_URL:      ${{ secrets.BH_REST_URL }}
          INSTANTLY_KEY:    ${{ secrets.INSTANTLY_API_KEY }}
        run: |
          python -c "import json,os,pathlib; pathlib.Path('mailshot_helper').mkdir(exist_ok=True); cfg={'bullhorn_client_id':os.environ['BH_CLIENT_ID'],'bullhorn_client_secret':os.environ['BH_CLIENT_SECRET'],'bullhorn_username':os.environ['BH_USERNAME'],'bullhorn_password':os.environ['BH_PASSWORD'],'bullhorn_redirect_uri':os.environ.get('BH_REDIRECT_URI','https://welcome.bullhornstaffing.com'),'dc':os.environ.get('BH_DC','emea'),'refresh_token':os.environ.get('BH_REFRESH_TOKEN',''),'rest_url':os.environ.get('BH_REST_URL',''),'instantly_api_key':os.environ.get('INSTANTLY_KEY','')}; open('mailshot_helper/config.json','w').write(json.dumps(cfg,indent=2))"

      - name: Write CV config
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEETS_ID:  ${{ secrets.GOOGLE_SHEETS_ID }}
          TURSO_URL:         ${{ secrets.TURSO_URL }}
          TURSO_AUTH_TOKEN:  ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          python -c "import json,os; cfg={'turso':{'url':os.environ.get('TURSO_URL',''),'auth_token':os.environ.get('TURSO_AUTH_TOKEN','')},'formatting':{'margin_top_cm':4.4,'margin_bottom_cm':2.4,'margin_left_cm':1.27,'margin_right_cm':1.27,'font_family':'Roboto','template':'Cornerstone.docx','name_size_pt':20,'heading_size_pt':12,'body_size_pt':10,'accent_color':'#2a2a2a','photo_enabled':False,'photo_width_mm':35,'logo_path':'','logo_width_mm':40},'anthropic_api_key':os.environ['ANTHROPIC_API_KEY'],'google_sheets':{'credentials_path':'service-account-key.json','spreadsheet_id':os.environ['GOOGLE_SHEETS_ID']}}; open('cv_config.json','w').write(json.dumps(cfg,indent=2))"

      - name: Write service account key
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: $env:SERVICE_ACCOUNT_JSON | Out-File -FilePath "cv_parse_format\service-account-key.json" -Encoding utf8

      - name: Build .ico icon
        run: |
          python -c "
          from PIL import Image
          img = Image.open('logo.png').convert('RGBA')
          sizes = [16,32,48,64,128,256]
          frames = [img.resize((s,s), Image.LANCZOS) for s in sizes]
          frames[0].save('logo.ico', format='ICO', sizes=[(s,s) for s in sizes], append_images=frames[1:])
          print('logo.ico ready')
          "

      - name: Write VERSION from tag
        run: $env:GITHUB_REF -replace 'refs/tags/v','' | Out-File -FilePath VERSION -Encoding utf8 -NoNewline

      - name: Copy tool modules to root for PyInstaller
        run: |
          Copy-Item cv_parse_format\cv_parse_format_tool.py .
          Copy-Item cv_parse_format\google_sheets_store.py .
          Copy-Item cv_parse_format\google_drive_store.py .
          Copy-Item cv_parse_format\turso_store.py .
          Copy-Item cv_parse_format\turso_cache.py .
          Copy-Item cv_parse_format\postgres_store.py .
          Copy-Item import_contact\contact_tool.py .
          Copy-Item mailshot_helper\mailshot_helper_tool.py .

      - name: PyInstaller build
        run: |
          pyinstaller `
            --noconfirm --windowed --name "CPS Tools" `
            --icon "logo.ico" `
            --version-file version_info.txt `
            --add-data "logo.png;." `
            --add-data "logo.ico;." `
            --add-data "cv_parse_format\templates;cv_parse_format\templates" `
            --add-data "cv_parse_format\design;cv_parse_format\design" `
            --add-data "cv_parse_format\fonts;cv_parse_format\fonts" `
            --add-data "mailshot_helper\config.json;mailshot_helper" `
            --add-data "cv_config.json;." `
            --add-data "cv_parse_format\service-account-key.json;cv_parse_format" `
            --add-data "contact_tool.py;." `
            --hidden-import cv_parse_format_tool `
            --hidden-import mailshot_helper_tool `
            --hidden-import google_sheets_store `
            --hidden-import google_drive_store `
            --hidden-import turso_store `
            --hidden-import turso_cache `
            --hidden-import lookup_store `
            --hidden-import postgres_store `
            --hidden-import updater `
            --add-data "VERSION;." `
            --hidden-import customtkinter --hidden-import anthropic --hidden-import pydantic `
            --hidden-import docx --hidden-import docxtpl --hidden-import pdfplumber `
            --hidden-import docx2pdf --hidden-import PIL --hidden-import fitz `
            --hidden-import requests --hidden-import google.oauth2.service_account `
            --hidden-import google.auth.transport.requests --hidden-import googleapiclient.discovery `
            --hidden-import gspread --hidden-import pandas --hidden-import openpyxl `
            --hidden-import pdfminer --hidden-import pdfminer.high_level `
            --hidden-import pdfminer.layout --hidden-import pdfminer.pdfpage `
            --hidden-import jinja2 `
            CornerstoneTools.py

      - name: Zip Windows build
        run: Compress-Archive -Path "dist\CPS Tools" -DestinationPath "CPS-Tools-Windows.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: CPS-Tools-Windows.zip

  release:
    name: Create GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with: {name: macos-build}

      - uses: actions/download-artifact@v4
        with: {name: windows-build}

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          gh release delete "$VERSION" --repo ${{ github.repository }} --yes 2>/dev/null || true

          gh release create "$VERSION" \
            --repo ${{ github.repository }} \
            --title "CPS Tools $VERSION" \
            --latest=false \
            --notes "## CPS Tools $VERSION

          > ⚠️ **This app is not code-signed.** macOS and Windows will show a security warning the first time you open it. This is expected — follow the one-time steps below to get past it.

          ---

          ## What's in V1.0

          | Tool | Version | What it does |
          |------|---------|--------------|
          | **CV Parse & Format** | V0.1 | Upload a candidate CV, parse it with Claude AI, review and edit, export a branded Cornerstone PDF |
          | **Mailshot Helper** | V1.0 | Pull contact lists from Bullhorn, push to Instantly or Dripify campaigns |
          | **Import Contacts** | V2.0 | Load a CSV of contacts and bulk-import into Bullhorn CRM with deduplication |

          ### Key features

          - **Shared team database** — CV profiles stored in Supabase PostgreSQL. Any team member who parses a CV can see it on any machine.
          - **Deduplication** — uploading the same CV twice loads the existing record instead of re-parsing and spending credits.
          - **Auto-save** — if a parsed profile hasn't been saved and the user navigates to CV format, it's saved automatically.
          - **Settings panel** — live connection health checks for Bullhorn, Anthropic, and PostgreSQL. In-app LibreOffice installer.
          - **Windows Segoe UI** — crisp font rendering on Windows across all three tools.
          - **Roboto fonts bundled** — CV PDFs match the Word template exactly on both platforms.
          - **macOS SSL fix** — LibreOffice installer now works correctly in the packaged macOS app.

          ---

          ## What is CPS Tools?

          CPS Tools is an internal desktop application built for the Cornerstone Projects recruitment team. It bundles three tools into a single app:

          | Tool | What it does |
          |------|-------------|
          | **CV Parse & Format** | Upload a candidate CV (Word or PDF), parse it into a structured profile using Claude AI, review and edit the details, then export a fully branded Cornerstone PDF |
          | **Import Contacts V2.0** | Load a CSV of contacts and bulk-import them into Bullhorn CRM with automatic deduplication and email verification |
          | **Mailshot Helper V1.0** | Pull contact lists from Bullhorn and push them to Instantly or Dripify email campaigns |

          ---

          ## Download

          | Platform | File | Minimum version |
          |----------|------|----------------|
          | **macOS** | \`CPS-Tools-macOS.zip\` | macOS 12 Monterey or later |
          | **Windows** | \`CPS-Tools-Windows.zip\` | Windows 10 or later |

          ---

          ## 🍎 macOS — Installation (one-time setup)

          **Step 1 — Unzip and try to open**
          1. Double-click \`CPS-Tools-macOS.zip\` to extract it
          2. Right-click \`CPS Tools.app\` → click **Open**
          3. A dialog appears: *\"CPS Tools cannot be opened because it is from an unidentified developer\"*
          4. Click **Cancel** (not Move to Trash)

          **Step 2 — Allow it in System Settings**
          1. Open **Apple menu** → **System Settings**
          2. Click **Privacy & Security** in the left sidebar
          3. Scroll down to the **Security** section
          4. You will see: *\"CPS Tools was blocked from use because it is not from an identified developer\"*
          5. Click **Open Anyway**
          6. Enter your Mac password if prompted
          7. Click **Open** in the confirmation dialog

          ✅ The app will open normally every time after this.

          ---

          ## 🪟 Windows — Installation (one-time setup)

          **Step 1 — Unzip**
          1. Right-click \`CPS-Tools-Windows.zip\` → **Extract All** → **Extract**

          **Step 2 — Run past SmartScreen**
          1. Open the extracted \`CPS Tools\` folder
          2. Double-click \`CPS Tools.exe\`
          3. A blue screen appears: *\"Windows protected your PC\"*
          4. Click **More info** (small link below the message)
          5. Click **Run anyway**

          ✅ SmartScreen will not appear again for this version after the first run.

          ---

          ## ⚙️ LibreOffice — Required for CV Parse & Format

          The CV Parse & Format tool requires **LibreOffice** to convert Word documents to branded PDFs. The app includes a built-in installer — no website or manual download needed.

          **How to install LibreOffice from inside the app:**
          1. Open CPS Tools
          2. Click the **⚙ gear icon** at the very bottom of the left sidebar
          3. The **Required Tools** panel opens — it shows LibreOffice status
          4. If it shows **✗ Not installed**, click the **Install** button
          5. The app downloads LibreOffice automatically (~330 MB) and shows live progress
          6. **macOS**: installs silently to your home Applications folder — no password needed
          7. **Windows**: a **User Account Control (UAC)** prompt appears — click **Yes** to allow the install (this is normal and required)
          8. When installation is complete, click the **↺ refresh button** in the sidebar to unlock the CV tool

          > If LibreOffice is already installed on your machine, the app detects it automatically — no action needed.

          ---

          ## Known issues

          | Issue | What to do |
          |-------|-----------|
          | macOS security warning on first open | Follow the Privacy & Security steps above |
          | Windows SmartScreen on first run | Click More info → Run anyway |
          | CV tool shows \"LibreOffice Required\" | Click the ⚙ gear button and install it |
          | Windows UAC prompt during LibreOffice install | Click Yes — this is expected |
          | CV tool still locked after LibreOffice installs | Click the ↺ refresh button in the sidebar |

          ---

          ## Credentials

          API keys and service credentials are baked into this build — no manual configuration needed. Contact the team administrator if any connection shows as failed at startup." \
            CPS-Tools-macOS.zip \
            CPS-Tools-Windows.zip
